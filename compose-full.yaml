services:
  proxy:
    image: nginx:alpine
    ports: ["80:80"]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [web]
    networks: [frontend]

  web:
    build: ./app
    environment:
      - API_URL=http://api:8000
    networks: [frontend]
    deploy:
      replicas: 2

  api:
    build: ./api
    environment:
      - REDIS_URL=redis://cache:6379
      - DB_DSN=postgresql://app:secret@db:5432/app
    depends_on:
      db: { condition: service_healthy }
      cache: { condition: service_started }
    networks: [frontend, backend]

  cache:
    image: redis:7-alpine
    networks: [backend]

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      retries: 5
    networks: [backend]

volumes:
  pgdata:

networks:
  frontend:
  backend: